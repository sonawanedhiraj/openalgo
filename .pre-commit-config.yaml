repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Frontend - Biome
  - repo: local
    hooks:
      - id: biome-check
        name: Biome lint and format
        entry: npx --prefix frontend biome check --write src/
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # Security scan — bandit (own isolated env, scans changed .py only)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-x", ".venv,frontend,test"]
        files: \.py$

  # Custom silent-drop rules — see .semgrep/silent-drops.yml +
  # audit/silent_drop_audit_2026-06-11.md. semgrep manages its own isolated env
  # here, so it's independent of the project's uv lockfile (semgrep cannot be
  # added to the lockfile — it pins tomli<2.1 / mcp==1.23.3, which conflict with
  # pip-audit and the project's mcp==1.27.0). --severity=ERROR: only the 4
  # confirmed P0/P1 rules block a commit; the cross-cutting WARNING heuristics
  # surface in CI but don't block local commits.
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.85.0
    hooks:
      - id: semgrep
        name: semgrep (silent-drop custom rules — ERROR only)
        args: ["--config", ".semgrep/silent-drops.yml", "--severity=ERROR", "--error", "--quiet"]
        files: \.py$

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json|uv\.lock

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/dist/
      - id: end-of-file-fixer
        exclude: ^frontend/dist/
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/
      - id: check-added-large-files
        args: ['--maxkb=1000']
