repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Frontend - Biome
  - repo: local
    hooks:
      - id: biome-check
        name: Biome lint and format
        entry: npx --prefix frontend biome check --write src/
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # Security scan — bandit (own isolated env, scans changed .py only).
  # Pinned 1.8.6 (was 1.7.9): bandit ≤1.7.x calls the `ast.Num` node which
  # Python 3.14 removed, so the hook crashed with `AttributeError: module 'ast'
  # has no attribute 'Num'` on the local 3.14 dev env (zero findings — a pure
  # tooling crash). 1.8.0+ switched to `ast.Constant`. Same class of Py3.14
  # pre-commit friction as the semgrep→uvx note below.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-x", ".venv,frontend,test"]
        files: \.py$

  # Custom silent-drop rules — see .semgrep/silent-drops.yml +
  # audit/silent_drop_audit_2026-06-11.md. Run via `uvx semgrep` (an isolated,
  # ephemeral tool env) rather than the pip-based returntocorp/semgrep repo hook:
  # the local dev .venv is Python 3.14, which has no semgrep wheels, so the
  # pip-built hook env failed to install ("py_env-python3.14 python.EXE not
  # found") and aborted every commit. `uvx semgrep` picks a compatible Python on
  # its own and is the exact invocation CLAUDE.md documents as canonical — see
  # the "Code-quality gates" section (semgrep cannot be added to the uv lockfile
  # because it pins tomli<2.1 / mcp==1.23.3, which conflict with pip-audit and
  # the project's mcp==1.27.0). --severity=ERROR: only the confirmed P0/P1 rules
  # block a commit; the cross-cutting WARNING heuristics surface in CI only.
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (silent-drop custom rules — ERROR only)
        entry: uvx semgrep --config .semgrep/silent-drops.yml --severity=ERROR --error --quiet
        language: system
        files: \.py$
        pass_filenames: true

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json|uv\.lock

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/dist/
      - id: end-of-file-fixer
        exclude: ^frontend/dist/
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/
      - id: check-added-large-files
        args: ['--maxkb=1000']
