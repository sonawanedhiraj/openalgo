name: Quality gate

# Two-job split (2026-06-14):
#
#   silent-drops — the custom Semgrep ERROR rules (the 4 confirmed P0/P1
#     silent-drop findings). This is the ONLY job intended to be a REQUIRED
#     status check on `main`'s branch protection today. It is kept deliberately
#     minimal (checkout + uv + uvx semgrep) so it stays green and fast: GitHub
#     gates status checks at the JOB level, not the step level, so the blocking
#     rules need their own job to be required independently.
#
#   quality — everything else (ruff, bandit, the WARNING heuristics, the public
#     Semgrep rulesets). INFORMATIONAL for now: ruff still has pre-existing debt
#     from the 1535-error backlog (Phase 1-4 cleanup landed but did not finish
#     it), so this job is currently red on ruff. It will be PROMOTED to a
#     required check on `main` once the ruff debt is fully clear and the job is
#     reliably green.
#
# Both jobs fire on the same triggers (PRs to dev/main, direct pushes to dev) —
# the split is about job granularity for branch protection, not about when the
# workflow runs.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: read   # prefix-regression-check reads PR labels

jobs:
  silent-drops:
    # The ONLY job that's required (or to-be-required) on main today.
    # Stays minimal so it stays green: install uv, run the silent-drops ERROR
    # rules via uvx semgrep (isolated tool env — semgrep is NOT in the project
    # lockfile due to a dependency conflict).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Semgrep silent-drop rules (ERROR — blocking)
        run: uvx semgrep --config .semgrep/silent-drops.yml --severity ERROR --error services/ blueprints/ sandbox/ restx_api/

  quality:
    # Everything else — informational. Will be promoted to a required check on
    # main once the ruff debt clears and this job is reliably green.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # The OpenAlgo runtime requires Python 3.12 (eventlet has no 3.14 wheels;
      # see memory py314-eventlet-werkzeug-boot-fail). Pin CI to 3.12.
      - name: Setup Python 3.12
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --group dev

      - name: Ruff (lint — blocking)
        run: uv run ruff check .

      # Bandit is non-blocking initially (|| true) — it has known noise on this
      # codebase. Tighten to blocking once the baseline is triaged.
      - name: Bandit (security — non-blocking)
        run: uv run --group dev bandit -r . -x .venv,frontend,test || true

      # WARNING-severity heuristics — informational, never block.
      - name: Semgrep custom rules (WARNING — informational)
        run: uvx semgrep --config .semgrep/silent-drops.yml services/ blueprints/ sandbox/ restx_api/ || true

      # Public Semgrep rulesets — best effort, non-blocking (avoids blocking on
      # third-party false positives).
      - name: Semgrep public rulesets (best effort)
        run: uvx semgrep --config=auto --severity=ERROR --error services/ blueprints/ sandbox/ restx_api/ || true

  prefix-regression-check:
    # Informational only (issue #307) — deliberately its OWN job so it can
    # never affect the `silent-drops` required check (GitHub gates required
    # status checks at the job level, not the step level — see the header
    # note above). Never required, never blocking: every step that can fail
    # is wrapped in continue-on-error or `|| true`.
    #
    # What it checks: for a PR labelled type:bug, does the PR's own new/
    # changed test coverage actually demonstrate the bug? It runs the PR's
    # new/changed test files against the pre-fix tree (the merge-base commit)
    # in an isolated checkout. If they ALL pass there too, the tests don't
    # prove the fix did anything — emits a ::warning:: annotation. If at
    # least one fails (or fails to collect — a new test importing a module
    # that doesn't exist pre-fix is an expected "fails on pre-fix"), the
    # tests demonstrate the regression as intended.
    #
    # Grounded in outputs/2026-07-02_scanner_deep_analysis.md #4: 50-55% of
    # scanner PRs in 06-21..07-02 fixed a defect a previous scanner PR
    # introduced/missed. This does not prevent that class of bug — it is a
    # cheap, non-blocking signal that a bug-fix PR's tests are load-bearing.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr-head

      - name: Skip if type:bug label is absent
        id: has_label
        continue-on-error: true
        run: |
          has_bug_label=$(printf '%s' '${{ toJSON(github.event.pull_request.labels.*.name) }}' \
              | python3 -c "import sys,json; print('type:bug' in json.load(sys.stdin))" 2>/dev/null || echo "False")
          echo "value=$has_bug_label" >> "$GITHUB_OUTPUT"
          if [ "$has_bug_label" != "True" ]; then
            echo "::notice::PR has no type:bug label — skipping pre-fix regression check."
          fi

      - name: Determine changed test files
        id: changed_tests
        if: steps.has_label.outputs.value == 'True'
        continue-on-error: true
        working-directory: pr-head
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          merge_base=$(git merge-base "$base_sha" "$head_sha" 2>/dev/null || echo "$base_sha")
          echo "merge_base=$merge_base" >> "$GITHUB_OUTPUT"
          files=$(git diff --name-only --diff-filter=ACMR "$merge_base" "$head_sha" -- 'test/' | grep -E '\.py$' || true)
          if [ -z "$files" ]; then
            echo "::notice::No test/*.py files added or modified by this PR — skipping pre-fix regression check."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<PREFIX_EOF"
              echo "$files"
              echo "PREFIX_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout merge-base (pre-fix tree)
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.changed_tests.outputs.merge_base }}
          path: pre-fix

      - name: Install uv
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        uses: astral-sh/setup-uv@v3

      - name: Setup Python 3.12
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        run: uv python install 3.12

      - name: Copy PR's new/changed test files onto the pre-fix tree
        id: copy_tests
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        run: |
          copied=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "pr-head/$f" ]; then
              mkdir -p "pre-fix/$(dirname "$f")"
              cp "pr-head/$f" "pre-fix/$f"
              copied="$copied $f"
            fi
          done <<< "${{ steps.changed_tests.outputs.files }}"
          echo "copied=$copied" >> "$GITHUB_OUTPUT"
          echo "Copied test files onto pre-fix tree:$copied"

      - name: Install deps (pre-fix tree)
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        working-directory: pre-fix
        run: uv sync --group dev

      - name: Run PR's new/changed tests against the pre-fix tree
        id: prefix_run
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        working-directory: pre-fix
        env:
          API_KEY_PEPPER: "test-pepper-key-for-ci-only-not-for-production"  # pragma: allowlist secret
          APP_KEY: "test-app-key-for-ci-only-not-for-production"  # pragma: allowlist secret
          FERNET_SALT: "test-fernet-salt-for-ci-only-not-for-production"  # pragma: allowlist secret
          # Passed via env, NOT inline ${{ }} interpolation: the output is a
          # NEWLINE-separated list, so inline interpolation would inject raw
          # newlines into the script — with 2+ files, line 1 runs pytest on
          # the first file only (no -x -q) and line 2 tries to EXECUTE the
          # second test file as a shell command. Env + IFS word-splitting
          # handles the newlines (and is injection-safe).
          TEST_FILES: ${{ steps.changed_tests.outputs.files }}
        run: |
          # word-splitting on $TEST_FILES is intentional (newline-separated list)
          # shellcheck disable=SC2086
          uv run pytest $TEST_FILES -x -q

      - name: Report verdict
        if: steps.has_label.outputs.value == 'True' && steps.changed_tests.outputs.has_files == 'true'
        continue-on-error: true
        run: |
          if [ "${{ steps.prefix_run.outcome }}" = "success" ]; then
            echo "::warning::type:bug PR — the new/changed test(s) in this PR ALL PASS on the pre-fix tree (merge-base ${{ steps.changed_tests.outputs.merge_base }}). This suggests the tests do not demonstrate the bug being fixed. Consider adding/adjusting a test that fails without this PR's code change."
          else
            echo "Tests fail (or fail to collect) on the pre-fix tree as expected — they demonstrate the regression this PR fixes."
          fi

      - name: Always succeed
        if: always()
        run: echo "prefix-regression-check is informational only — this job never fails the PR."
