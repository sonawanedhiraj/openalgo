name: CI (GitHub-hosted, manual)

# TRIMMED 2026-06-07 for the L3 self-hosted-runner pivot.
#
# Backend CI (gate, backend-test, backend-lint, security-scan) now runs on the
# Docker-isolated self-hosted runner — see .github/workflows/ci-self-hosted.yml
# and ci/runner/. This file NO LONGER fires automatically on push/PR; its only
# trigger is manual `workflow_dispatch`, so it consumes zero GitHub minutes
# unless explicitly run. The jobs kept here are the FRONTEND checks that the
# (backend-only) self-hosted workflow does not cover, available on demand before
# shipping UI changes.
#
# Deleted in the trim (now covered elsewhere or out of scope):
#   gate, backend-test, backend-lint, security-scan -> ci-self-hosted.yml
#   frontend-e2e   -> run locally (heavy Playwright install, low solo ROI)
#   commit-dist    -> frontend/dist is committed by hand when shipping UI
#   docker-build, docker-manifest -> we don't publish images

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:run
