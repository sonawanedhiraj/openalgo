# Direct-to-dev code-push guard — ALERT ONLY, never blocks.
# Policy: PRs are required on `main`; `dev` accepts direct pushes (parameter
# log, registry, hotfixes). This guard Telegram-pings the operator whenever a
# DIRECT (non-PR-merge) commit on `dev` touches a code path, so silent drift in
# runtime code is surfaced without gating the push. Doc/test/CI-only pushes are
# exempt. To add an exempt path, edit EXEMPT_PATTERNS in the bash step below.

name: Direct-to-dev code-push guard

on:
  push:
    branches: [dev]

jobs:
  guard:
    runs-on: ubuntu-latest
    # PR-merge commits are already reviewed — this guard is for DIRECT pushes only.
    if: >-
      !contains(github.event.head_commit.message, 'Merge pull request #') &&
      !contains(github.event.head_commit.message, 'Merge branch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify diff and alert
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          set -euo pipefail

          # --- skip second-parent (merge) commits the `if:` couldn't catch ---
          PARENTS=$(git rev-list --parents -n 1 "$AFTER_SHA" | wc -w)
          if [ "$PARENTS" -ge 3 ]; then
            echo "Merge commit ($((PARENTS - 1)) parents) — skipping alert."
            exit 0
          fi

          # --- changed-file list (handle new-branch all-zeros `before`) ---
          ZERO="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$ZERO" ] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            CHANGED=$(git diff --name-only "${AFTER_SHA}^" "$AFTER_SHA" 2>/dev/null \
              || git show --name-only --pretty=format: "$AFTER_SHA")
          else
            CHANGED=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")
          fi

          # --- classification (glob match; `*` matches `/` in [[ ]]) ---
          # Exempt wins over code: doc/test/CI-only pushes never alert.
          EXEMPT_PATTERNS=(
            "docs/*" "*.md" "strategies/*/LEARNINGS.md" "strategies/*/VERSION_LOG.md"
            "strategies/STRATEGY_REGISTRY.md" "docs/PARAMETER_LOG.md" "audit/*" "outputs/*"
            ".github/*" "test/*" "*.yml" "*.yaml" ".gitignore" ".python-version"
            ".semgrep/*" "pyproject.toml" "uv.lock"
          )
          # Default-deny: alert only when NOT exempt AND on the code list.
          CODE_PATTERNS=(
            "services/*" "broker/*" "restx_api/*" "database/*" "blueprints/*" "utils/*"
            "mcp/*" "websocket_proxy/*" "sandbox/*" "frontend/src/*" "app.py" "bridge/*"
          )

          match() {  # $1 = file, $2.. = glob patterns
            local f="$1"; shift
            local p
            for p in "$@"; do
              # shellcheck disable=SC2053  -- intentional glob match
              [[ "$f" == $p ]] && return 0
            done
            return 1
          }

          ALERT_FILES=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            match "$f" "${EXEMPT_PATTERNS[@]}" && continue
            match "$f" "${CODE_PATTERNS[@]}" && ALERT_FILES+=("$f")
          done <<< "$CHANGED"

          if [ "${#ALERT_FILES[@]}" -eq 0 ]; then
            echo "No code paths touched — no alert."
            exit 0
          fi

          # --- build the terse alert ---
          COUNT=${#ALERT_FILES[@]}
          FILES_STR=$(printf '%s\n' "${ALERT_FILES[@]:0:8}")
          [ "$COUNT" -gt 8 ] && FILES_STR="${FILES_STR}"$'\n'"..."

          TEXT="⚠️ Direct-to-dev code push
          SHA: ${AFTER_SHA:0:7}
          Author: ${COMMIT_AUTHOR}
          Msg: ${COMMIT_MSG:0:80}
          Files: ${FILES_STR}"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::Telegram secrets unset — alert printed, not sent:"
            echo "$TEXT"
            exit 0
          fi

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            || echo "::warning::Telegram POST failed (non-fatal)."
