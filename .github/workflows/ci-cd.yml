name: CI/CD Pipeline (Unit Tests + Docker + E2E)

on:
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - 'docs/**'
      - 'strategies/STRATEGY_REGISTRY.md'
      - '*.md'
  push:
    branches: [dev, main]
    paths-ignore:
      - 'docs/**'
      - 'strategies/STRATEGY_REGISTRY.md'
      - '*.md'

# Supersede in-progress runs for the same ref so a new push to a PR cancels the
# previous CI/CD instead of piling a second run onto the single self-hosted
# runner (see issue #17 — runner starvation).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # STAGE 1: CI - Unit and Integration Tests (Native Python, Parallelized)
  # ============================================================================
  ci-unit-tests:
    name: "CI: Unit + Integration Tests"
    # Runs on GitHub-hosted ubuntu-latest — repo is public so minutes are free
    # and unlimited. This frees the single-slot self-hosted runner for the one
    # job that genuinely needs the laptop's Docker (cd-docker-e2e), and lets
    # the two CI/CD stages run truly in parallel on independent infra pools.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Matches ci-self-hosted.yml's setup so the uv wheel cache is reused.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies (incl. dev for pytest-xdist)
        run: uv sync --dev

      - name: Run unit + integration tests (parallelized)
        # `test_bridge_server.py` is in-process FastAPI TestClient — no broker /
        # network deps — so it's safe to include here.
        # `test_email_functionality.py` remains skipped: it uses `input()` and
        # needs real SMTP creds — operator-only script, not a test.
        run: |
          uv run python -m pytest test/ \
            -n auto \
            --ignore=test/e2e \
            --ignore=test/test_email_functionality.py \
            --tb=short
        env:
          API_KEY_PEPPER: "test-pepper-key-for-ci-only-not-for-production"  # pragma: allowlist secret
          APP_KEY: "test-app-key-for-ci-only-not-for-production"  # pragma: allowlist secret
          FERNET_SALT: "test-fernet-salt-for-ci-only-not-for-production"  # pragma: allowlist secret

      - name: Report CI status
        if: always()
        run: |
          echo "✅ CI Stage Complete"
          echo "Unit tests passed on ubuntu-latest"

  # ============================================================================
  # STAGE 1b: CI - Frontend Unit Tests (vitest)
  # ============================================================================
  # Runs in parallel with ci-unit-tests and cd-docker-e2e on its own free
  # ubuntu-latest slot. Previously only fired via the manual workflow_dispatch
  # in ci.yml, so frontend regressions slipped to dev unnoticed.
  ci-frontend-tests:
    name: "CI: Frontend Tests (vitest)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npm run test:run

  # ============================================================================
  # STAGE 2a: CD-BUILD — build the Docker image once, share via artifact (#213)
  # ============================================================================
  # Split from the monolithic cd-docker-e2e job so subsequent test jobs can
  # consume the same built image without rebuilding. PR A validates the
  # mechanic with one consumer (cd-docker-e2e); PR B will fan out the test
  # stage into parallel jobs (pytest / Playwright smoke / mock-broker
  # Playwright) all needing this same artifact.
  cd-build:
    name: "CD: Build Docker image"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --quiet

      - name: Generate throwaway .env (compose build reads it)
        run: |
          cp .sample.env .env
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k1
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k2
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k3
          sed -i "s|^APP_KEY = .*|APP_KEY = '$(cat /tmp/k1)'|" .env
          sed -i "s|^API_KEY_PEPPER = .*|API_KEY_PEPPER = '$(cat /tmp/k2)'|" .env
          sed -i "s|^FERNET_SALT = .*|FERNET_SALT = '$(cat /tmp/k3)'|" .env
          sed -i "s|^REDIRECT_URL = .*|REDIRECT_URL = 'http://127.0.0.1:5000/zerodha/callback'|" .env

      - name: Preflight — Docker daemon + disk space
        run: |
          docker version --format 'Daemon: {{.Server.Version}}'
          AVAIL=$(df / --output=avail -BG 2>/dev/null | tail -1 | tr -d 'G ' || echo 999)
          echo "Disk free: ${AVAIL}GB"
          if [ "${AVAIL:-999}" -lt 5 ]; then
            echo "::error::Disk has only ${AVAIL}GB free."
            exit 1
          fi

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker compose build --quiet
          docker image ls openalgo:latest
          echo "✅ openalgo:latest built"

      - name: Save image to tarball
        run: |
          docker save openalgo:latest -o /tmp/openalgo-image.tar
          ls -lh /tmp/openalgo-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openalgo-image
          path: /tmp/openalgo-image.tar
          retention-days: 1
          compression-level: 0  # already-compressed Docker layers; skip re-gzip

  # ============================================================================
  # STAGE 2b: CD - Docker Boot + E2E Tests
  # ============================================================================
  cd-docker-e2e:
    name: "CD: Docker + E2E Tests"
    # TRIAL (#211): moved from self-hosted to ubuntu-latest after the laptop
    # runner went offline and blocked CD for hours. ubuntu-latest has Docker
    # pre-installed and the repo is public so minutes are free. The runner
    # IS the host, so `host.docker.internal` is replaced with `localhost`.
    needs: cd-build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          pip install uv --quiet

      - name: Generate throwaway .env for testing
        run: |
          cp .sample.env .env
          # Generate random secrets (throwaway for testing only)
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k1
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k2
          uv run python -c "import secrets; print(secrets.token_hex(32))" > /tmp/k3
          sed -i "s|^APP_KEY = .*|APP_KEY = '$(cat /tmp/k1)'|" .env
          sed -i "s|^API_KEY_PEPPER = .*|API_KEY_PEPPER = '$(cat /tmp/k2)'|" .env
          sed -i "s|^FERNET_SALT = .*|FERNET_SALT = '$(cat /tmp/k3)'|" .env
          sed -i "s|^REDIRECT_URL = .*|REDIRECT_URL = 'http://127.0.0.1:5000/zerodha/callback'|" .env
          # Ensure sandbox mode
          sed -i "s|^SIMPLIFIED_ENGINE_MODE = .*|SIMPLIFIED_ENGINE_MODE = 'sandbox'|" .env
          if ! grep -q "SECTOR_FOLLOW_CAP5_VOL_MODE" .env; then
            echo "SECTOR_FOLLOW_CAP5_VOL_MODE='sandbox'" >> .env
          fi
          if ! grep -q "FUTURES_FOLLOW_MODE" .env; then
            echo "FUTURES_FOLLOW_MODE='sandbox'" >> .env
          fi
          # Verify .env file was created and is readable
          test -f .env && echo "✅ .env file created successfully" || echo "❌ .env file creation failed"
          ls -lh .env

      - name: Preflight — Docker daemon + disk space
        # ubuntu-latest ships with Docker installed and the runner IS the host,
        # so the previous host.docker.internal + socket-mount checks are dropped.
        run: |
          docker version --format 'Daemon: {{.Server.Version}}'
          AVAIL=$(df / --output=avail -BG 2>/dev/null | tail -1 | tr -d 'G ' || echo 999)
          echo "Disk free: ${AVAIL}GB"
          if [ "${AVAIL:-999}" -lt 5 ]; then
            echo "::error::Disk has only ${AVAIL}GB free (need ≥5 GB for Docker build)."
            exit 1
          fi

      - name: Download image artifact (from cd-build)
        uses: actions/download-artifact@v4
        with:
          name: openalgo-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/openalgo-image.tar
          docker image ls openalgo:latest
          rm /tmp/openalgo-image.tar
          echo "✅ openalgo:latest loaded from artifact (no rebuild)"

      - name: Boot container with health check
        # `--wait` blocks until every service reports healthy (or fails), using
        # the compose healthcheck defined on the service. Replaces the previous
        # bash poll that ran in parallel with — and competed against — the
        # healthcheck. Compose exits non-zero on healthcheck failure, so no
        # extra status check is needed.
        run: |
          echo "Starting OpenAlgo container (compose --wait)..."
          docker compose up -d --wait
          docker compose ps
          echo "✅ Container is running and healthy"

      # Diagnostics dump on boot failure (refs #183). When `compose --wait`
      # exits non-zero with "container openalgo-web is unhealthy", the run
      # currently contains zero application-side detail — leaving us blind to
      # WHY the container is unhealthy. This step runs only on a prior-step
      # failure and dumps the three things we'd run by hand: container state,
      # the last 300 log lines, and the healthcheck history.
      - name: Dump container diagnostics on boot failure
        if: failure()
        run: |
          echo "::group::compose ps -a"
          docker compose ps -a || true
          echo "::endgroup::"
          echo "::group::openalgo-web logs (last 300 lines)"
          # Use raw `docker logs` against the container_name. `docker compose
          # logs openalgo-web` fails — the compose service is named `openalgo`
          # (see docker-compose.yaml), not `openalgo-web`; only the container
          # is renamed via container_name.
          docker logs --tail=300 openalgo-web 2>&1 || true
          echo "::endgroup::"
          echo "::group::container health inspect"
          docker inspect --format '{{json .State.Health}}' openalgo-web 2>/dev/null || true
          echo "::endgroup::"

      - name: Run pytest E2E tests against running application
        # On ubuntu-latest the runner IS the host, so the openalgo-web container
        # is reachable at localhost:5000 directly — no host-gateway indirection.
        env:
          OPENALGO_URL: http://localhost:5000
        run: |
          echo "Running pytest E2E tests..."
          pip install uv --quiet
          uv run python -m pytest test/e2e --tb=short
          echo "✅ pytest E2E tests passed"

      # ====================================================================
      # Playwright Phase A — smoke against the already-booted main container.
      # Restored from the deleted deploy-pipeline.yml per issue #149.
      #
      # Runs Playwright inside Microsoft's official image
      # (mcr.microsoft.com/playwright:v1.58.0-jammy) — chromium + system deps
      # are baked in, so the previous `npx playwright install --with-deps`
      # step (which hung post-download for 22 min on ubuntu-latest, see #211)
      # disappears entirely. Image tag matches @playwright/test pinned in
      # frontend/package-lock.json (1.58.0); bump together when upgrading.
      # `--network host` makes localhost:5000/:5099/:8001 reach the running
      # compose containers on the runner.
      # ====================================================================
      - name: Run Playwright smoke against booted container
        env:
          OPENALGO_URL: http://localhost:5000
        run: |
          echo "Running Playwright smoke (chromium) against booted container..."
          docker run --rm --network host \
            -v "${{ github.workspace }}/frontend:/frontend" -w /frontend \
            -e OPENALGO_URL="$OPENALGO_URL" \
            -e CI=true \
            mcr.microsoft.com/playwright:v1.58.0-jammy \
            sh -c 'npm ci --no-audit --no-fund && npx playwright test --config playwright.smoke.config.ts'
          echo "✅ Playwright smoke passed"

      - name: Upload Playwright smoke report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report/
          retention-days: 7

      # ====================================================================
      # Playwright Phase B — Tier-3 mock-broker happy-path.
      # Requires the test compose stack (OpenAlgo on :5099 + mock broker on
      # :8001) which conflicts with the main container's :5000 binding via
      # docker-compose.test.yml's openalgo service mapping — so tear down the
      # main stack first.
      # ====================================================================
      - name: Tear down main container (port swap for mock-broker stack)
        run: |
          echo "Tearing down main container before mock-broker stack boot..."
          docker compose down -v --remove-orphans || true

      - name: Build + boot mock-broker stack
        run: |
          echo "Building mock-broker stack (docker-compose.test.yml)..."
          docker compose -f docker-compose.test.yml -p mock_test build --quiet
          echo "Booting mock-broker stack (compose --wait)..."
          docker compose -f docker-compose.test.yml -p mock_test up -d --wait
          docker compose -f docker-compose.test.yml -p mock_test ps
          echo "✅ Mock-broker stack healthy"

      # Diagnostics dump on mock-broker boot failure. Mirrors the main-stack
      # diagnostics earlier in the job, but targets the mock_test-* containers
      # (the main `openalgo-web` is already torn down at this point so its
      # dump is meaningless here).
      - name: Dump mock-broker stack diagnostics on boot failure
        if: failure()
        run: |
          echo "::group::compose ps -a (mock_test project)"
          docker compose -f docker-compose.test.yml -p mock_test ps -a || true
          echo "::endgroup::"
          echo "::group::mock_test-openalgo-1 logs (last 300 lines)"
          docker logs --tail=300 mock_test-openalgo-1 2>&1 || true
          echo "::endgroup::"
          echo "::group::mock_test-openalgo-1 health inspect"
          docker inspect --format '{{json .State.Health}}' mock_test-openalgo-1 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::mock_test-mock_broker-1 logs (last 100 lines)"
          docker logs --tail=100 mock_test-mock_broker-1 2>&1 || true
          echo "::endgroup::"

      - name: Run Playwright broker happy-path
        env:
          OPENALGO_URL: http://localhost:5099
          MOCK_BROKER_URL: http://localhost:8001
        run: |
          echo "Running Playwright broker happy-path against mock stack..."
          docker run --rm --network host \
            -v "${{ github.workspace }}/frontend:/frontend" -w /frontend \
            -e OPENALGO_URL="$OPENALGO_URL" \
            -e MOCK_BROKER_URL="$MOCK_BROKER_URL" \
            -e CI=true \
            mcr.microsoft.com/playwright:v1.58.0-jammy \
            sh -c 'npm ci --no-audit --no-fund && npx playwright test --config playwright.broker.config.ts'
          echo "✅ Broker happy-path passed"

      - name: Upload Playwright broker report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-broker-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down mock-broker stack
        if: always()
        run: |
          echo "Cleaning up mock-broker stack..."
          docker compose -f docker-compose.test.yml -p mock_test down -v --remove-orphans || true

      - name: Final teardown (main + .env)
        if: always()
        run: |
          echo "Cleaning up any remaining containers..."
          docker compose down -v --remove-orphans || true
          rm -f .env
          echo "✅ Cleanup complete"

      - name: Report CD status
        if: always()
        run: |
          echo "✅ CD Stage Complete"
          echo "Docker built, booted, pytest E2E + Playwright smoke + mock-broker happy-path all ran"

# ============================================================================
# Branch Protection Requirements
# ============================================================================
# Add these as required status checks on dev/main branches:
# - ci-unit-tests
# - ci-frontend-tests
# - cd-docker-e2e
#
# Command to add via GitHub CLI:
# gh api repos/sonawanedhiraj/openalgo/branches/dev/protection/required_status_checks \
#   --input - <<< '{"strict": true, "contexts": ["ci-unit-tests", "ci-frontend-tests", "cd-docker-e2e"]}'
