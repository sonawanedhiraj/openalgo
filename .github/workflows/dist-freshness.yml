name: Dist freshness

on:
  pull_request:
    branches: [dev]
    paths:
      - 'frontend/src/**'
      - 'frontend/dist/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - 'frontend/biome.json'

jobs:
  dist-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm install --no-audit --no-fund

      - name: Rebuild dist
        run: |
          cd frontend
          npm run build

      - name: Verify dist matches committed
        run: |
          if [ -n "$(git status --porcelain frontend/dist)" ]; then
            echo "::error::frontend/dist is STALE. Run \`cd frontend && npm run build\` and commit the result."
            echo ""
            echo "Diff:"
            git --no-pager diff --stat frontend/dist
            echo ""
            echo "First few changed lines (sample):"
            git --no-pager diff frontend/dist | head -200
            exit 1
          fi
          echo "frontend/dist is fresh."
